name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version from tag
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to ${version}"
          sed -i '' "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml

      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sshenc dist/
          cp target/${{ matrix.target }}/release/sshenc-keygen dist/
          cp target/${{ matrix.target }}/release/sshenc-agent dist/
          cp target/${{ matrix.target }}/release/libsshenc_pkcs11.dylib dist/
          tar czf sshenc-${{ matrix.target }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: sshenc-${{ matrix.target }}
          path: sshenc-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/sshenc-aarch64-apple-darwin/sshenc-aarch64-apple-darwin.tar.gz \
            artifacts/sshenc-x86_64-apple-darwin/sshenc-x86_64-apple-darwin.tar.gz

  update-repo:
    name: Update Version and Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256s
        id: sha
        run: |
          arm_sha=$(sha256sum artifacts/sshenc-aarch64-apple-darwin/sshenc-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          intel_sha=$(sha256sum artifacts/sshenc-x86_64-apple-darwin/sshenc-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          echo "arm_sha256=$arm_sha" >> "$GITHUB_OUTPUT"
          echo "intel_sha256=$intel_sha" >> "$GITHUB_OUTPUT"

      - name: Update version in Cargo.toml
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml

      - name: Update formula
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          cat > Formula/sshenc.rb << RUBY
          class Sshenc < Formula
            desc "macOS Secure Enclave-backed SSH key management"
            homepage "https://github.com/jgowdy/sshenc"
            version "${version}"
            license "MIT"

            on_arm do
              url "https://github.com/jgowdy/sshenc/releases/download/${tag}/sshenc-aarch64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.arm_sha256 }}"
            end

            on_intel do
              url "https://github.com/jgowdy/sshenc/releases/download/${tag}/sshenc-x86_64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.intel_sha256 }}"
            end

            depends_on :macos

            def install
              bin.install "sshenc"
              bin.install "sshenc-keygen"
              bin.install "sshenc-agent"
              lib.install "libsshenc_pkcs11.dylib"
            end

            def caveats
              <<~EOS
                To configure SSH to use sshenc for all connections:

                  sshenc install

                The agent starts automatically when SSH needs it.

                To generate a new Secure Enclave key:

                  sshenc keygen --label my-key

                To remove the SSH configuration:

                  sshenc uninstall
              EOS
            end

            test do
              assert_match "sshenc", shell_output("#{bin}/sshenc --version")
            end
          end
          RUBY

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' Formula/sshenc.rb

      - name: Commit and push
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock Formula/sshenc.rb
          git diff --cached --quiet || git commit -m "Release ${tag}: update version and formula"
          git push origin main

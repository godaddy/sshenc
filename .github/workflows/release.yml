name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    uses: jgowdy/libenclaveapp/.github/workflows/reusable-release.yml@main
    with:
      app_name: sshenc
      unix_binaries: "sshenc sshenc-keygen sshenc-agent gitenc"
      unix_libs: "libsshenc_pkcs11.dylib"
      windows_binaries: "sshenc.exe sshenc-keygen.exe sshenc-agent.exe gitenc.exe"
      windows_dlls: "sshenc_pkcs11.dll"
      wix_file: "installer/sshenc.wxs"
      homebrew_tap_repo: "jgowdy/homebrew-sshenc"
      homebrew_formula_class: "Sshenc"
      homebrew_description: "macOS Secure Enclave-backed SSH key management"
      scoop_bucket_repo: "jgowdy/scoop-sshenc"
      scoop_description: "Hardware-backed SSH key management (Windows TPM 2.0)"
      has_winget: true
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

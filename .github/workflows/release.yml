name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Clone libenclaveapp
        uses: actions/checkout@v5
        with:
          repository: jgowdy/libenclaveapp
          path: ../libenclaveapp

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set version from tag (Unix)
        if: runner.os != 'Windows'
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "Setting version to ${version}"
          sed -i '' "s/^version = \".*\"/version = \"${version}\"/" Cargo.toml
          grep -q "version = \"${version}\"" Cargo.toml || { echo "ERROR: version not set in Cargo.toml"; exit 1; }

      - name: Set version from tag (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          Write-Host "Setting version to $version"
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml
          if (-not (Select-String -Path Cargo.toml -Pattern "version = `"$version`"" -Quiet)) {
            Write-Error "ERROR: version not set in Cargo.toml"
            exit 1
          }

      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sshenc dist/
          cp target/${{ matrix.target }}/release/sshenc-keygen dist/
          cp target/${{ matrix.target }}/release/sshenc-agent dist/
          cp target/${{ matrix.target }}/release/gitenc dist/
          cp target/${{ matrix.target }}/release/libsshenc_pkcs11.dylib dist/
          tar czf sshenc-${{ matrix.target }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/sshenc.exe dist/
          Copy-Item target/${{ matrix.target }}/release/sshenc-keygen.exe dist/
          Copy-Item target/${{ matrix.target }}/release/sshenc-agent.exe dist/
          Copy-Item target/${{ matrix.target }}/release/gitenc.exe dist/
          Copy-Item target/${{ matrix.target }}/release/sshenc_pkcs11.dll dist/
          Compress-Archive -Path dist/* -DestinationPath sshenc-${{ matrix.target }}.zip

      - name: Build MSI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          wix build installer/sshenc.wxs -o sshenc-${{ matrix.target }}.msi -bindpath .

      - uses: actions/upload-artifact@v5
        with:
          name: sshenc-${{ matrix.target }}
          path: |
            sshenc-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/sshenc-aarch64-apple-darwin/sshenc-aarch64-apple-darwin.tar.gz \
            artifacts/sshenc-x86_64-apple-darwin/sshenc-x86_64-apple-darwin.tar.gz \
            artifacts/sshenc-x86_64-pc-windows-msvc/sshenc-x86_64-pc-windows-msvc.zip \
            artifacts/sshenc-x86_64-pc-windows-msvc/sshenc-x86_64-pc-windows-msvc.msi

  update-packages:
    name: Update Package Managers
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Compute SHA256s
        id: sha
        run: |
          arm_sha=$(sha256sum artifacts/sshenc-aarch64-apple-darwin/sshenc-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          intel_sha=$(sha256sum artifacts/sshenc-x86_64-apple-darwin/sshenc-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          win_sha=$(sha256sum artifacts/sshenc-x86_64-pc-windows-msvc/sshenc-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)
          msi_sha=$(sha256sum artifacts/sshenc-x86_64-pc-windows-msvc/sshenc-x86_64-pc-windows-msvc.msi | cut -d' ' -f1)
          echo "arm_sha256=$arm_sha" >> "$GITHUB_OUTPUT"
          echo "intel_sha256=$intel_sha" >> "$GITHUB_OUTPUT"
          echo "win_sha256=$win_sha" >> "$GITHUB_OUTPUT"
          echo "msi_sha256=$msi_sha" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/jgowdy/homebrew-sshenc.git /tmp/tap

          cat > /tmp/tap/Formula/sshenc.rb << 'RUBY'
          class Sshenc < Formula
            desc "macOS Secure Enclave-backed SSH key management"
            homepage "https://github.com/jgowdy/sshenc"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_arm do
              url "https://github.com/jgowdy/sshenc/releases/download/TAG_PLACEHOLDER/sshenc-aarch64-apple-darwin.tar.gz"
              sha256 "ARM_SHA_PLACEHOLDER"
            end

            on_intel do
              url "https://github.com/jgowdy/sshenc/releases/download/TAG_PLACEHOLDER/sshenc-x86_64-apple-darwin.tar.gz"
              sha256 "INTEL_SHA_PLACEHOLDER"
            end

            depends_on :macos

            def install
              bin.install "sshenc"
              bin.install "sshenc-keygen"
              bin.install "sshenc-agent"
              bin.install "gitenc"
              lib.install "libsshenc_pkcs11.dylib"
            end

            def caveats
              <<~EOS
                To configure SSH to use sshenc for all connections:

                  sshenc install

                The agent starts automatically when SSH needs it.

                To generate a new Secure Enclave key:

                  sshenc keygen --label my-key

                To remove the SSH configuration:

                  sshenc uninstall
              EOS
            end

            test do
              assert_match "sshenc", shell_output("#{bin}/sshenc --version")
            end
          end
          RUBY

          sed -i 's/^          //' /tmp/tap/Formula/sshenc.rb
          sed -i "s/VERSION_PLACEHOLDER/${version}/" /tmp/tap/Formula/sshenc.rb
          sed -i "s|TAG_PLACEHOLDER|${tag}|" /tmp/tap/Formula/sshenc.rb
          sed -i "s/ARM_SHA_PLACEHOLDER/${{ steps.sha.outputs.arm_sha256 }}/" /tmp/tap/Formula/sshenc.rb
          sed -i "s/INTEL_SHA_PLACEHOLDER/${{ steps.sha.outputs.intel_sha256 }}/" /tmp/tap/Formula/sshenc.rb

          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update sshenc to ${tag}"
          git push

      - name: Update Scoop bucket
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          git clone https://x-access-token:${{ secrets.SCOOP_BUCKET_TOKEN }}@github.com/jgowdy/scoop-sshenc.git /tmp/bucket

          cat > /tmp/bucket/bucket/sshenc.json << SCOOP
          {
              "version": "${version}",
              "description": "Hardware-backed SSH key management (Windows TPM 2.0)",
              "homepage": "https://github.com/jgowdy/sshenc",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/jgowdy/sshenc/releases/download/${tag}/sshenc-x86_64-pc-windows-msvc.zip",
                      "hash": "${{ steps.sha.outputs.win_sha256 }}"
                  }
              },
              "bin": [
                  "sshenc.exe",
                  "sshenc-keygen.exe",
                  "sshenc-agent.exe",
                  "gitenc.exe"
              ],
              "post_install": "Write-Host 'Run \"sshenc install\" to configure SSH.'",
              "notes": [
                  "Run 'sshenc install' to configure SSH and start the agent.",
                  "Run 'sshenc keygen' to create your first hardware-backed key.",
                  "Run 'sshenc uninstall' to revert SSH configuration."
              ]
          }
          SCOOP
          sed -i 's/^          //' /tmp/bucket/bucket/sshenc.json

          cd /tmp/bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update sshenc to ${tag}"
          git push

      - name: Generate winget manifest
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          msi_sha=$(echo "${{ steps.sha.outputs.msi_sha256 }}" | tr 'a-f' 'A-F')

          mkdir -p /tmp/winget

          sed -e "s/PackageVersion: .*/PackageVersion: ${version}/" \
            winget/JGowdy.sshenc.yaml > /tmp/winget/JGowdy.sshenc.yaml

          sed -e "s/PackageVersion: .*/PackageVersion: ${version}/" \
              -e "s|InstallerUrl: .*|InstallerUrl: https://github.com/jgowdy/sshenc/releases/download/${tag}/sshenc-x86_64-pc-windows-msvc.msi|" \
              -e "s/InstallerSha256: .*/InstallerSha256: ${msi_sha}/" \
            winget/JGowdy.sshenc.installer.yaml > /tmp/winget/JGowdy.sshenc.installer.yaml

          sed -e "s/PackageVersion: .*/PackageVersion: ${version}/" \
              -e "s|ReleaseNotesUrl: .*|ReleaseNotesUrl: https://github.com/jgowdy/sshenc/releases/tag/${tag}|" \
            winget/JGowdy.sshenc.locale.en-US.yaml > /tmp/winget/JGowdy.sshenc.locale.en-US.yaml

          echo "Generated winget manifests for ${version}:"
          cat /tmp/winget/JGowdy.sshenc.yaml
          echo "---"
          cat /tmp/winget/JGowdy.sshenc.installer.yaml
          echo "---"
          cat /tmp/winget/JGowdy.sshenc.locale.en-US.yaml

      - name: Upload winget manifest
        uses: actions/upload-artifact@v5
        with:
          name: winget-manifest
          path: /tmp/winget/

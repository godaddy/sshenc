ShortDescription: Hardware-backed SSH key management using Windows TPM 2.0
Description: |-
  sshenc creates, manages, and uses hardware-backed SSH keys for OpenSSH and git+ssh workflows.
  Keys are non-exportable, device-bound ECDSA P-256 keys stored in the TPM 2.0 via the
  Microsoft Platform Crypto Provider. Includes an SSH agent, git commit signing, and
  per-key identity management.

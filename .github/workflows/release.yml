name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sshenc dist/
          cp target/${{ matrix.target }}/release/sshenc-keygen dist/
          cp target/${{ matrix.target }}/release/sshenc-agent dist/
          cp target/${{ matrix.target }}/release/libsshenc_pkcs11.dylib dist/
          tar czf sshenc-${{ matrix.target }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: sshenc-${{ matrix.target }}
          path: sshenc-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            artifacts/sshenc-aarch64-apple-darwin/sshenc-aarch64-apple-darwin.tar.gz \
            artifacts/sshenc-x86_64-apple-darwin/sshenc-x86_64-apple-darwin.tar.gz

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sshenc-aarch64-apple-darwin
          path: artifacts

      - name: Compute SHA256
        id: sha
        run: |
          sha=$(shasum -a 256 artifacts/sshenc-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          sha="${{ steps.sha.outputs.sha256 }}"
          sed -i "s|url \".*\"|url \"https://github.com/jgowdy/sshenc/releases/download/${tag}/sshenc-aarch64-apple-darwin.tar.gz\"|" Formula/sshenc.rb
          sed -i "s|sha256 \".*\"|sha256 \"${sha}\"|" Formula/sshenc.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sshenc.rb
          git commit -m "Update formula for ${tag}" || true
          git push
